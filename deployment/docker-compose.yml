services:
  web:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: anime-ir-web
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    command: ["npm", "run", "start"]

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: anime-ir-worker
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy
    command: ["npm", "run", "worker"]

  db:
    image: postgres:16-alpine
    container_name: anime-ir-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: anime_ir
      POSTGRES_USER: anime_ir
      POSTGRES_PASSWORD: change_me
    ports:
      - "5432:5432"
    volumes:
      - anime_ir_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anime_ir -d anime_ir"]
      interval: 10s
      timeout: 5s
      retries: 5

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: anime-ir-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - web

volumes:
  anime_ir_pgdata:
